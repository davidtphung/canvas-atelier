<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Canvas Atelier">
  <!-- Cream paper tile -->
  <rect width="32" height="32" rx="7" fill="#F4EFE6"/>
  <!-- Soft inner edge like archival paper -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" stroke="#1A1A1A" stroke-opacity="0.06"/>
  <!-- Fine drafting grid (muted) -->
  <g stroke="#1A1A1A" stroke-opacity="0.07" stroke-width="0.5">
    <path d="M8 0v32M16 0v32M24 0v32M0 8h32M0 16h32M0 24h32"/>
  </g>
  <!-- Primary biomorphic mass -->
  <path
    fill="#1A1A1A"
    d="M6.2 20.5c-.4-5.8 3.2-10.4 8.4-11.2 3.2-.5 5.8.9 7.6 3.4 1.9 2.6 2.4 5.6 1.1 8.2-1.6 3.1-4.9 4.9-8.7 5-3.6.1-6.8-1.4-8.4-5.4z"
  />
  <!-- Satellite form -->
  <ellipse cx="22.2" cy="10.2" rx="4.2" ry="3.6" fill="#1A1A1A" transform="rotate(-18 22.2 10.2)"/>
  <!-- Cutout void (cream hole) -->
  <ellipse cx="14.8" cy="17.4" rx="2.6" ry="2.3" fill="#F4EFE6" transform="rotate(12 14.8 17.4)"/>
</svg>
